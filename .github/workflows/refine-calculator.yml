name: 更新精煉計算器

# 每天自動抓 Albion 市場價、重算利潤、更新 refine.html
on:
  schedule:
    - cron: "0 22 * * *"      # 每天 UTC 22:00（台灣時間 06:00）
  workflow_dispatch:            # 也可到 Actions 頁手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 取得原始碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝依賴
        run: pip install requests

      - name: 產生計算器網頁
        run: |
          cd tools/refine
          python refine_bot.py
          cp refine_profit.html "$GITHUB_WORKSPACE/refine.html"

      - name: 提交更新（有變動才 commit）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add refine.html
          if git diff --staged --quiet; then
            echo "價格無變動，略過"
          else
            git commit -m "自動更新精煉計算器市場價 $(date -u +%Y-%m-%d)"
            git push
          fi
